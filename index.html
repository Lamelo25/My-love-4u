<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hey! How are You? 💕</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Allura&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            color: #000000;
            z-index: 4;
            font-family: "Poppins", serif;
        }

        body {
            height: 100vh;
            width: 100%;
            z-index: 1;
        }

        section {
            z-index: 1;
            position: relative;
            height: 100%;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(145deg, #FFE0EC 0%, #FFD6E8 50%, #FFCCE0 100%);
            overflow: hidden;
        }

        body, html {
            height: 100%;
            margin: 0;
            overflow: hidden;
        }

        .video-background {
            position: fixed;
            top: 0;
            left: 0;
            z-index: -1;
            width: 100%;
            height: 100%;
        }

        .video-background video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .container {
            height: 70%;
            border: 2px solid black;
            width: 33%;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 20px;
            backdrop-filter: blur(2px);
        }

        .image-box {
            height: 70%;
            width: 100%;
        }

        .actual-image {
            height: 80%;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .gif {
            height: 90%;
            width: 64%;
        }

        .text-one {
            height: 20%;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 0.5px solid rgba(0, 0, 0, 0.164);
        }

        .yes-no {
            height: 30%;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: space-evenly;
        }

        .yes {
            font-family: "Allura", serif;
            font-size: 7vh;
            font-weight: 550;
            height: 60%;
            width: 40%;
            border: none;
            cursor: pointer;
            background-color: #FF8FAB;
            scale: 1;
            z-index: 500;
            box-shadow: 4px 4px 10px black;
            transition: scale 0.1s ease-in;
            border-radius: 50px;
            color: white;
        }

        .no {
            font-family: "Allura", serif;
            font-size: 7vh;
            font-weight: 550;
            height: 60%;
            width: 40%;
            border: none;
            cursor: pointer;
            background-color: #FB607F;
            scale: 1;
            box-shadow: 4px 4px 10px black;
            transition: scale 0.1s ease-in;
            border-radius: 50px;
            color: white;
        }

        .yes:hover, .no:hover {
            opacity: 0.95;
            scale: 0.95;
        }

        @media (min-width:200px) and (max-width:1025px) {
            .container {
                height: 80%;
                width: 98%;
            }
            .gif {
                height: 90%;
                width: 80%;
            }
        }
    </style>
</head>
<body>
    <section>
        <div class="video-background">
            <video autoplay loop muted playsinline>
                <source src="resources/heart.webm" type="video/webm">
                Your browser does not support the video tag.
            </video>
        </div>
        <div class="container">
            <div class="image-box">
                <div class="actual-image">
                    <img src="resources/cat-heart.gif" alt="gif" class="gif" id="gif">
                </div>
                <div class="text-one">
                    <p style="font-size: 1.4rem;text-align: center;" id="text">will you be mine again? ❤️😘</p>
                </div>
            </div>
            <div class="yes-no">
                <button class="yes" id="yes">Yes</button>
                <button class="no" id="no">No</button>
            </div>
        </div>
    </section>

    <script>
        const yesBtn = document.getElementById('yes');
        
        yesBtn.addEventListener('click', () => {
            window.location.href = "love-letter.html";
        });
        
        const noBtn = document.getElementById('no');
        let moveCount = 0;
        
        function makeNoRunaway() {
            if (moveCount >= 5) {
                noBtn.innerText = "Okay Yes! 💕";
                noBtn.style.backgroundColor = "#FF8FAB";
                noBtn.addEventListener('click', () => {
                    window.location.href = "love-letter.html";
                });
                return;
            }
            
            const container = document.querySelector('.yes-no');
            const btnRect = noBtn.getBoundingClientRect();
            const containerRect = container.getBoundingClientRect();
            const maxX = containerRect.width - btnRect.width - 10;
            const maxY = containerRect.height - btnRect.height - 10;
            const randomX = Math.random() * maxX;
            const randomY = Math.random() * maxY;
            
            noBtn.style.position = 'relative';
            noBtn.style.left = randomX + 'px';
            noBtn.style.top = randomY + 'px';
            
            const messages = ["🥺 please?", "think again~", "i love you 💕", "say yes!", "don't say no"];
            noBtn.innerText = messages[moveCount % messages.length];
            moveCount++;
            
            setTimeout(() => {
                if(moveCount < 5) noBtn.innerText = "No";
            }, 700);
        }
        
        noBtn.addEventListener('click', makeNoRunaway);
    </script>
</body>
</html>
